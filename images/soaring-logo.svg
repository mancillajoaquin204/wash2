<!-- SVG Logo placeholder for Soaring Car Wash -->
<svg width="200" height="80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E31C23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E72B7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle for logo -->
  <circle cx="40" cy="40" r="35" fill="url(#logoGradient)" />
  
  <!-- Car wash symbol - droplets and car -->
  <g fill="white">
    <!-- Droplets -->
    <circle cx="25" cy="25" r="3" />
    <circle cx="35" cy="20" r="2.5" />
    <circle cx="45" cy="25" r="3" />
    <circle cx="55" cy="20" r="2" />
    
    <!-- Simplified car shape -->
    <rect x="20" y="45" width="40" height="15" rx="3" />
    <rect x="25" y="40" width="30" height="8" rx="2" />
    
    <!-- Wheels -->
    <circle cx="28" cy="62" r="4" fill="#333" />
    <circle cx="52" cy="62" r="4" fill="#333" />
  </g>
  
  <!-- Text -->
  <text x="90" y="30" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#E31C23">SOARING</text>
  <text x="90" y="55" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#1E72B7">CAR WASH</text>
</svg>